<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Résultats IA</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
            padding: 40px;
        }

        .card {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        pre {
            background: #0f172a;
            color: #22c55e;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: #6366f1;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="badge">Analyse terminée</div>
        <h2>Votre Profil Personnalisé</h2>
        <pre id="jsonDisplay"></pre>
    </div>

    <script>
        const data = localStorage.getItem("quizResults");

        if (data) {
            document.getElementById("jsonDisplay").textContent = data;
        } else {
            document.getElementById("jsonDisplay").textContent = "Aucune donnée trouvée.";
        }
    </script>

</body>

</html>
