    <div class="topMenu">
        <button onclick="ouvrirMenu('general')">Généraliste</button>
        <button onclick="ouvrirMenu('tech')">Technicien</button>
        <button onclick="ouvrirMenu('com')">Commercial</button>
    </div>

    <main>
        <div class="gauche" id="menuGauche"></div>
        <div class="droite" id="info">
            <h2>INFORMATIONS</h2>
            <p>Clique sur une filière pour voir les informations détaillées, les débouchés et les établissements.</p>
        </div>
    </main>

    <script>
        let typeChoisi = "";
        let cyclesOuverts = {};

        function ouvrirMenu(type) {
            typeChoisi = type;
            const menu = document.getElementById("menuGauche");
            menu.style.display = "block";
            menu.innerHTML = `
        <div class="cycle">
            <h3 onclick="toggleCycle(1)">1er Cycle</h3>
            <div id="cycle1"></div>
        </div>
        <div class="cycle">
            <h3 onclick="toggleCycle(2)">2e Cycle</h3>
            <div id="cycle2"></div>
        </div>
    `;
            document.getElementById("info").innerHTML = `
        <h2>Orientation scolaire</h2>
        <p>Clique sur une filière pour voir les informations détaillées, les débouchés et les établissements.</p>
    `;
        }

        function toggleCycle(n) {
            if (cyclesOuverts[n]) {
                document.getElementById("cycle" + n).innerHTML = "";
                cyclesOuverts[n] = false;
            } else {
                ouvrirCycle(n);
                cyclesOuverts[n] = true;
            }
        }

        function ouvrirCycle(n) {
            const zone = document.getElementById("cycle" + n);
            zone.innerHTML = "";

            if (n === 1) {
                if (typeChoisi === "general") {
                    zone.innerHTML = `
                <div class="filiere" onclick="infoFiliere(
                    '6ème',
                    'La 6ème constitue l’introduction aux fondamentaux du secondaire. Les élèves découvrent les matières principales comme le français, les mathématiques, les sciences, l’histoire et la géographie. On y développe la compréhension écrite et orale, la logique mathématique et les premiers projets scientifiques. Des activités culturelles et sportives sont intégrées pour développer le sens critique, la créativité et la communication. L’objectif est de préparer l’élève à des choix éclairés pour le cycle suivant. Cette année permet également de renforcer les compétences sociales et organisationnelles, ainsi que la capacité à travailler en groupe et individuellement.',
                    'Débouchés : poursuite en 5ème générale, orientation vers les sections scientifiques, littéraires ou techniques, préparation aux examens du CEP, acquisition de méthodologie d’étude, développement du sens critique, participation à clubs et projets éducatifs.',
                    'Lycée Généraliste de Yaoundé, Lycée Leclerc Douala, Lycée Bilingue de Garoua'
                )">6ème</div>

                <div class="filiere" onclick="infoFiliere(
                    '5ème',
                    'La 5ème consolide les acquis de la 6ème et introduit des notions plus complexes en français, mathématiques, sciences et langues. Les élèves participent à des expériences pratiques, des projets de groupe et développent des compétences d’analyse et de synthèse. La filière prépare à la compréhension critique des textes, aux raisonnements logiques et à la créativité. L’accent est mis sur l’autonomie et la responsabilité dans les travaux scolaires. Cette année permet de renforcer la culture générale et la capacité à résoudre des problèmes complexes. Les élèves commencent à identifier leurs intérêts pour le futur choix de série au 2ème cycle.',
                    'Débouchés : poursuite en 4ème générale, orientation vers séries A, C, D, E ou SH, développement des compétences analytiques, participation aux concours et olympiades, renforcement de la méthodologie d’étude et projets scientifiques.',
                    'Lycée Général de Yaoundé, Lycée Leclerc Douala, Lycée de Bafoussam, Lycée de Bonanjo Douala'
                )">5ème</div>

                <div class="filiere" onclick="infoFiliere(
                    '4ème',
                    'La 4ème approfondit les notions étudiées en 5ème et prépare aux choix de séries du 2e cycle. Les matières scientifiques et littéraires deviennent plus spécialisées, avec des travaux pratiques, des exposés et des projets de recherche. Les élèves développent leur esprit critique, leur créativité et leur capacité à résoudre des problèmes complexes. L’accent est mis sur la lecture, la rédaction, l’expérimentation scientifique et l’expression orale. La 4ème permet aussi d’acquérir des compétences sociales, organisationnelles et de travail en équipe. Cette année constitue une étape clé pour identifier les domaines d’intérêt de chaque élève et orienter sa future série.',
                    'Débouchés : poursuite en 3ème générale, préparation au brevet, consolidation des compétences scientifiques et littéraires, participation aux clubs et activités culturelles, développement de méthodologies de travail avancées, choix éclairé de la série du 2e cycle.',
                    'Lycée Général de Yaoundé, Lycée Technique de Douala, Lycée Bilingue de Garoua'
                )">4ème</div>

                <div class="filiere" onclick="infoFiliere(
                    '3ème',
                    'La 3ème est l’année de transition vers le 2e cycle et prépare au BEPC. Les élèves approfondissent les matières principales, participent à des projets interdisciplinaires, et développent des compétences d’analyse et de synthèse. L’objectif est de maîtriser les méthodes de travail, la lecture critique, l’écriture structurée et les compétences scientifiques de base. La 3ème met également l’accent sur la préparation aux examens officiels et sur l’orientation vers la série qui correspond le mieux aux aptitudes et intérêts de l’élève. Des activités culturelles et sportives complètent la formation générale.',
                    'Débouchés : obtention du BEPC, choix de la série au 2e cycle (A, C, D, E, TI, SH), renforcement des compétences analytiques et scientifiques, participation aux concours, préparation aux orientations spécialisées, développement de compétences sociales et organisationnelles.',
                    'Lycée Général de Yaoundé, Lycée Leclerc Douala, Lycée de Bafoussam, Lycée de Bonanjo Douala'
                )">3ème</div>
            `;
                }

                if (typeChoisi === "tech") {
                    zone.innerHTML = `
        <div class="filiere" onclick="infoFiliere(

            'Électricien qualifié, Technicien d’installation électrique, Dépanneur électrique, Chargé de maintenance d’appareils électriques, Ouvrier qualifié en réseaux électriques, Assistant chef d’équipe en travaux publics',
            'CETIC de Bonaberi (Douala), CETIC de Nylon (Douala), CETIC de Bepanda (Douala), CETIC de Yaoundé (Centre), Collège Technique Industriel de Maroua'
        )">Électricité (ELEQ)</div>

        <div class="filiere" onclick="infoFiliere(
            'Menuiserie‑Ameublement (MENA)',
            'La filière Menuiserie‑Ameublement (CAP MENA) prépare les élèves à travailler le bois et ses dérivés. Les élèves apprennent les techniques, outils et machines pour la fabrication de meubles, portes, fenêtres et structures en bois. Ils étudient la sécurité en atelier, la lecture de plans, les types de bois et leurs propriétés. La formation combine théorie en salle et pratique intense en atelier. Les élèves savent dimensionner, découper, assembler et finir des produits en bois. Cette filière donne de solides compétences artisanales très demandées sur le marché local.',
            'Menuisier industriel, Ébéniste, Fabricant de meubles, Ouvrier qualifié en bois, Responsable d’atelier, Entrepreneur artisan',
            'CETIC de Bonaberi, CETIC de Deido, CETIF (CETIC pour filles), Centres artisanaux publics et privés'
        )">Menuiserie‑Ameublement (MENA)</div>

        <div class="filiere" onclick="infoFiliere(

            'Maçon spécialisé, Ouvrier qualifié en bâtiment, Conseil en matériaux de construction, Superviseur de petit chantier, Entrepreneur en construction, Agent de maintenance de bâtiments',
            'CETIC de Bonamoussadi (Douala), CETIC de Bepanda, CETIC de Yaoundé, Lycées techniques publics'

            'Installation Sanitaire (INSA)',

            'Plombier qualifié, Technicien en assainissement, Installateur sanitaire, Responsable d’entretien d’immeubles, Entrepreneur plomberie, Conseiller technique en réseaux d’eau',
            'CETIC de Bonaberi, CETIC de Deido, CETIC de Yaoundé, Centres de formation artisanale'
        )">Installation Sanitaire (INSA)</div>

        <div class="filiere" onclick="infoFiliere(
            'Couture et Mesure (COME)',
            'La filière Couture et Mesure (CAP COME) forme des élèves aux techniques de coupe, de couture, de montage de vêtements et d’ajustement sur mesure. La formation inclut la théorie des textiles, la prise de mesures, le patronage, la coupe, l’utilisation de machines à coudre ainsi que la finition des vêtements. On y apprend aussi la gestion d’un petit atelier, la relation clientèle et la création de modèles adaptés aux tendances du marché. Ce CAP est une excellente porte d’entrée dans l’artisanat de la mode.',
            'Couturier professionnel, Styliste de mode, Modéliste, Artisan designer de vêtements, Responsable d’atelier de couture, Entrepreneur textile',
            'CETIC de Bonaberi, CETIF (CETIC pour filles), Centres de formation en couture'
        )">Couture et Mesure (COME)</div>

        <div class="filiere" onclick="infoFiliere(
            'Carrosserie‑Peinture Automobile (CAPA)',
            'La filière Carrosserie‑Peinture Automobile (CAP CAPA) prépare au travail sur carrosserie de véhicules, réparation des chocs, redressage des tôles, préparation des surfaces et application de peintures spécialisées. Les élèves apprennent les normes de sécurité, les techniques de décapage, de ponçage, de soudure légère et la finition esthétique. La formation est très pratique et adaptée à l’industrie automobile ou aux garages indépendants.',
            'Carrossier automobile, Peintre automobile, Technicien de carrosserie, Agent de maintenance auto, Entrepreneur en garage, Contrôleur qualité carrosserie',
            'CETIC de Bepanda, CETIC de Yaoundé, Centres de formation auto'
        )">Carrosserie‑Peinture Automobile (CAPA)</div>

        <div class="filiere" onclick="infoFiliere(
            'Mécanique Automobile Électrique (MAEL)',
            'La filière Mécanique Automobile Électrique (CAP MAEL) forme à la maintenance et réparation des systèmes électriques des véhicules. Les élèves apprennent l’électricité automobile, le diagnostic électronique, le contrôle des circuits, les systèmes de démarrage et d’allumage, ainsi que l’entretien de batteries. Cette spécialité est essentielle dans l’environnement automobile moderne.',
            'Technicien électricité auto, Dépanneur auto électrique, Diagnostiqueur automobile, Assistant en maintenance auto, Entrepreneur garage auto, Technicien pièces auto',
            'CETIC de Douala, CETIC de Yaoundé, Centres automobiles privés'
        )">Mécanique Automobile Électrique (MAEL)</div>
    `;
                }

                if (typeChoisi === "com") {
                    zone.innerHTML = `
        <div class="filiere" onclick="infoFiliere(
            'Comptabilité (COM)',
            'La filière Comptabilité (COM) forme les élèves aux bases de la tenue des comptes et de la gestion financière d’une entreprise ou d’une organisation. Les élèves apprennent à enregistrer des opérations commerciales, tenir un livre de caisse, comprendre les documents comptables (factures, journaux, bilan simplifiés). La formation comprend des modules sur la comptabilité générale, les mathématiques appliquées au commerce et l’utilisation de logiciels de comptabilité simples. Elle met l’accent sur la précision, l’organisation et la rigueur dans le traitement des chiffres. Cette filière prépare aussi à des fonctions de soutien administratif et financier dans des petites et moyennes entreprises. Les cours sont souvent accompagnés d’exercices pratiques et d’études de cas.',
            'Assistant comptable, Caissier dans une entreprise ou banque, Gestionnaire de stocks, Assistant fiscal, Agent administratif financier, Tenancier de carnet de commandes',
            'CETIC de Bonaberi (Douala), CETIC de Deido (Douala), CETIC de Yaoundé, Lycée Technique bilingue, Lycées techniques publics'
        )">Comptabilité (COM)</div>

        <div class="filiere" onclick="infoFiliere(
            'Secrétariat & Bureautique (SECRET)',
            'La filière Secrétariat & Bureautique forme les élèves aux tâches de bureau, à la gestion de documents et à la communication administrative. Les élèves apprennent la dactylographie, la gestion des appels téléphoniques, l’accueil physique, la correspondance professionnelle, le classement et l’archivage des dossiers. La filière inclut aussi des leçons de bureautique (traitement de texte, tableur, création de présentations), ce qui permet aux jeunes d’être rapidement opérationnels dans un contexte de bureau moderne. On met l’accent sur la rigueur, la bonne communication, l’organisation et le respect des délais. Les élèves effectuent des stages pratiques pour se familiariser avec le travail en entreprise ou en administration publique.',
            'Secrétaire administratif, Assistant de direction, Réceptionniste d’entreprise, Archiviste ou gestionnaire de documents, Assistant de bureau, Assistant de ressources humaines',
            'CETIC de Bonaberi (Douala), CETIC de Deido, CETIC de Yaoundé, Lycées techniques privés, Lycée Technique d’arrondissement'
        )">Secrétariat & Bureautique (SECRET)</div>

        <div class="filiere" onclick="infoFiliere(
            'Vente & Commerce (VENTE)',
            'La filière Vente & Commerce est conçue pour initier les élèves aux activités commerciales et aux techniques de vente. Les élèves apprennent les principes de la distribution, la gestion des stocks, l’accueil de la clientèle, la préparation de commandes, la négociation commerciale de base et les opérations de caisse. Le programme inclut des notions de marketing simple, d’éthique commerciale et de merchandising pour optimiser la présentation des produits. La formation vise à développer l’esprit de service, l’aisance relationnelle, la connaissance des produits et l’efficacité dans les transactions. La filière prépare les jeunes à travailler directement dans le secteur du commerce ou à créer leurs propres petites unités commerciales.',
            'Vendeur en boutique ou supermarché, Caissier ou opérateur de point de vente, Représentant commercial, Agent de distribution, Assistants de gestion de point de vente, Entrepreneur micro‑commerce',
            'CETIC de Bonaberi (Douala), CETIC de Bepanda, CETIC de Deido, Centres commerciaux formateurs, Lycées techniques publics'
        )">Vente & Commerce (VENTE)</div>

        <div class="filiere" onclick="infoFiliere(
            'Gestion & Administration (GESTION)',
            'La filière Gestion & Administration associe des éléments de comptabilité, de bureautique et d’organisation administrative. Elle donne une formation plus large que la Comptabilité seule, avec des notions de planification, d’organisation de réunions, de traitement des données et de gestion documentaire. Les élèves apprennent aussi à préparer des rapports, à travailler avec des logiciels de gestion administrative, et à coordonner des opérations de bureau. Cette filière est idéale pour ceux qui souhaitent travailler dans des services administratifs, des ONG, des PME, des collectivités ou des structures publiques. Elle développe l’esprit d’analyse, la rigueur organisationnelle et les compétences techniques de travail de bureau.',
            'Assistant administratif, Coordination de bureau, Gestionnaire de PME, Assistant de projet, Technicien en administration de données, Facilitateur administratif',
            'CETIC de Bonaberi, CETIC de Bepanda, CETIC de Yaoundé, Lycée Technique bilingue, Collèges d’enseignement technique'
        )">Gestion & Administration (GESTION)</div>

        <div class="filiere" onclick="infoFiliere(
            'Analyse de Données & Informatique Commerciale (ADCI)',
            'Cette filière prépare les élèves au traitement des données commerciales à l’aide d’outils informatiques professionnels. Ils apprennent à utiliser des logiciels de gestion de base de données, des feuilles de calculs avancées, l’analyse statistique appliquée au commerce, les systèmes d’information commerciale et la visualisation de données. La filière combine des notions de commerce et d’informatique, ce qui donne une base solide pour les métiers modernes où l’analyse des données est essentielle. Idéale pour ceux qui veulent travailler dans des départements de données, d’audit ou de pilotage commercial.',
            'Technicien en analyse de données, Assistant commercial informatique, Gestionnaire de bases de données commerciales, Assistant en digitalisation, Analyste junior, Technicien support commercial',
            'CETIC spécialisés (certaines unités), Lycée technique avec option informatique, Centres de formation numérique'
        )">Analyse de Données & Informatique Commerciale (ADCI)</div>
    `;
                }
            }


            if (n === 2) {
                if (typeChoisi === "general") {
                    zone.innerHTML = `
                <div class="filiere" onclick="infoFiliere(
                    'Série A',
                    'Cette série met l’accent sur les lettres classiques, les langues vivantes, la littérature et la philosophie. Les élèves y développent des compétences avancées en expression écrite et orale, en analyse critique des textes et en compréhension des phénomènes culturels et historiques. Les cours incluent la grammaire approfondie, l’histoire littéraire, la rédaction de dissertations, l’art oratoire et les travaux pratiques. Les élèves participent à des débats, des exposés et des projets culturels. Cette série prépare aux carrières académiques et intellectuelles, favorise le développement de la pensée critique et des capacités de synthèse.',

                )">Série A</div>

                <div class="filiere" onclick="infoFiliere(
                    'Série C',
                    'Cette série est orientée vers les mathématiques, la physique et les sciences expérimentales. Les élèves y acquièrent une formation scientifique solide, avec des travaux pratiques, des expériences en laboratoire et des projets de recherche. L’enseignement inclut la résolution de problèmes complexes, l’expérimentation, l’analyse critique et le raisonnement logique. Les élèves développent des compétences en modélisation, calculs avancés, et méthode scientifique. La série prépare aux études supérieures en ingénierie, informatique et sciences appliquées.',
                    'Débouchés : ingénieur, architecte, chercheur scientifique, programmeur, statisticien, analyste de données, technicien supérieur, consultant scientifique, analyste financier',

                )">Série C</div>

                <div class="filiere" onclick="infoFiliere(
                    'Série D',
